# SPDX-License-Identifier: MIT
# =============================================================================
# BLDC Co-Simulation Testbench - simulation parameters, single source of truth
# =============================================================================
#
# Every parameter is an inline table:
#
#   name = { value = ..., unit = "...", status = "...", blocked_by = "Qn",
#            source = "...", note = "..." }
#
# `value`, `unit`, `status` are required. `blocked_by` references an item in
# notes/open-questions.md and is required for any unconfirmed status.
#
# Status vocabulary (most to least trusted):
#
#   measured         - measured on our actual hardware
#   datasheet        - from a component datasheet in docs/ (cite in `source`)
#   decided          - a design decision we own (recorded in architecture.md)
#   ti-evm-baseline  - TI reference-board value; the ZONRI clone MAY differ
#   assumed          - engineering guess pending a decision or measurement
#   placeholder      - plumbing-only value; not even a guess
#
# The last three are UNCONFIRMED. Loaders print a banner listing every
# unconfirmed parameter at the start of each run, and write the same list as
# a sidecar next to every output artifact. A trace produced from unconfirmed
# values should never be mistaken for a prediction about the real hardware.
#
# Units are SI unless stated; dimensionless values use unit = "1".

[meta]
schema = 1
statuses = ["measured", "datasheet", "decided", "ti-evm-baseline", "assumed", "placeholder"]
unconfirmed_statuses = ["ti-evm-baseline", "assumed", "placeholder"]

# -----------------------------------------------------------------------------
# Motor electrical spec - the quantities a bench session actually measures
# (line-to-line, what a DMM/LCR/scope reads). The wye-equivalent per-phase
# values in [motor] are DERIVED from these (derive_params.py); the unit
# conversions are encoded once and unit-tested instead of redone by hand.
# !! ENTIRELY PLACEHOLDER: no motor selected or identified (Q1) !!
# -----------------------------------------------------------------------------
[motor_spec]
r_line_line = { value = 1.0, unit = "Ohm", status = "placeholder", blocked_by = "Q1", note = "terminal-to-terminal resistance" }
l_line_line = { value = 2.0e-3, unit = "H", status = "placeholder", blocked_by = "Q1", note = "terminal-to-terminal inductance" }
ke_line_line_peak = { value = 0.034641016151377546, unit = "V.s/rad", status = "placeholder", blocked_by = "Q1", note = "peak line-to-line BEMF per mech rad/s (drill-spin scope measurement); ~= 60/(2*pi*Kv_rpm_per_v) if only Kv is known" }
pole_count = { value = 8, unit = "1", status = "placeholder", blocked_by = "Q1", note = "magnet pole count (pole pairs derived)" }

# -----------------------------------------------------------------------------
# Motor (wye-equivalent per-phase model values, derived from [motor_spec])
# Consumed by: one-phase slice (rung 1) onward.
# -----------------------------------------------------------------------------
[motor]
R = { value = 0.5, unit = "Ohm", status = "placeholder", blocked_by = "Q1", derived_from = "motor_spec", note = "phase resistance, wye-equivalent = r_line_line/2" }
L = { value = 1.0e-3, unit = "H", status = "placeholder", blocked_by = "Q1", derived_from = "motor_spec", note = "phase inductance, wye-equivalent = l_line_line/2" }
Ke = { value = 0.02, unit = "V.s/rad", status = "placeholder", blocked_by = "Q1", derived_from = "motor_spec", note = "peak phase BEMF constant = ke_line_line_peak/sqrt(3) (sinusoidal)" }
Kt = { value = 0.02, unit = "N.m/A", status = "placeholder", blocked_by = "Q1", derived_from = "motor_spec", note = "= Ke by energy consistency of the plant's torque coupling" }
J = { value = 2.0e-4, unit = "kg.m2", status = "placeholder", blocked_by = "Q1", note = "rotor + load inertia (spin-down measurement, not circuit-derivable)" }
B = { value = 1.0e-4, unit = "N.m.s/rad", status = "placeholder", blocked_by = "Q1", note = "viscous damping (spin-down measurement)" }
pole_pairs = { value = 4, unit = "1", status = "placeholder", blocked_by = "Q1", derived_from = "motor_spec", note = "= pole_count/2" }
# 0 = sinusoidal, 1 = ideal trapezoid; fit to a scope trace during motor ID.
emf_trapezoid_blend = { value = 0.0, unit = "1", status = "placeholder", blocked_by = "Q1", note = "back-EMF shape: 0 = pure sinusoidal (PMSM, the FOC assumption), 1 = clamp(2sin) 120-deg flat-top trapezoid (BLDC, six-step). FOC scenarios use 0; six-step scenarios may use either. The plant is phase-variable abc and handles both - see notes/foc-checklist.md stage 1." }
# Mechanical realism terms (realism-checklist stage 2; default-off in parity
# scenarios, enabled per bench scenario via bench_factory.realism()).
cogging_torque = { value = 5.0e-3, unit = "N.m", status = "placeholder", blocked_by = "Q1", note = "peak detent torque; slot/pole dependent" }
cogging_order = { value = 24, unit = "1", status = "placeholder", blocked_by = "Q1", note = "detents per mech rev ~ LCM(slots, poles); 12N8P guess" }
coulomb_friction = { value = 2.0e-3, unit = "N.m", status = "placeholder", blocked_by = "Q1", note = "kinetic friction torque (no static/kinetic split modeled)" }
stiction_omega_eps = { value = 0.5, unit = "rad/s", status = "decided", note = "tanh regularization width for Coulomb friction; numerics, not physics" }

# -----------------------------------------------------------------------------
# DC bus / bench supply (Q5: bring-up operating point not yet decided)
# -----------------------------------------------------------------------------
[bus]
vbus = { value = 12.0, unit = "V", status = "assumed", blocked_by = "Q5", note = "bench bring-up bus voltage" }
supply_current_limit = { value = 1.0, unit = "A", status = "assumed", blocked_by = "Q5", note = "bench supply limit for first power" }
capacitance = { value = 1.66e-3, unit = "F", status = "ti-evm-baseline", blocked_by = "Q7", source = "tidr740a BOM", note = "bulk electrolytics; clone unverified" }

# -----------------------------------------------------------------------------
# Bench supply dynamics (realism stage 1; bench scenarios only - parity runs
# keep a stiff source). CV with series impedance, CC fold at the limit, and
# no current sinking (regen pumps the bus cap).
# -----------------------------------------------------------------------------
[supply]
r_source = { value = 0.05, unit = "Ohm", status = "assumed", blocked_by = "Q5", note = "CV-mode source impedance incl. leads" }
v_alarm = { value = 20.0, unit = "V", status = "assumed", blocked_by = "Q5", note = "bus overvoltage alarm for regen scenarios; far under 85 V FETs / 100 V caps but protects 16 V-class assumptions" }
ramp_time = { value = 0.0, unit = "s", status = "decided", note = "E18: power-on v_set ramp duration (0 = instant); slow-ramp scenarios sweep the UVLO region during boot" }

[drv8301_uvlo]
pvdd_falling = { value = 5.9, unit = "V", status = "datasheet", source = "SLOS719F / slva552", note = "PVDD UVLO falling threshold; below this the device resets registers (the slva552 brownout cause)" }
pvdd_hysteresis = { value = 0.3, unit = "V", status = "assumed", note = "rising-recovery hysteresis; not explicitly specified" }

# -----------------------------------------------------------------------------
# PWM / gate drive
# -----------------------------------------------------------------------------
[pwm]
frequency = { value = 20.0e3, unit = "Hz", status = "decided", source = "architecture.md ADC decision", note = "pinned near 20 kHz by ADC schedule; bootstrap needs >= ~20 kHz" }
rtl_dead_time = { value = 1.0e-6, unit = "s", status = "assumed", blocked_by = "Q5", note = "dead time the RTL enforces, above the DTC hardware floor" }

[inverter]
fet_rds_on = { value = 4.6e-3, unit = "Ohm", status = "datasheet", source = "crmicro-crss052n08n-datasheet.pdf @ VGS=10V", note = "ZONRI clone FETs" }
body_diode_vf = { value = 0.95, unit = "V", status = "datasheet", source = "crmicro-crss052n08n-datasheet.pdf" }
dtc_dead_time_floor = { value = 50.0e-9, unit = "s", status = "assumed", blocked_by = "Q7", note = "DRV8301 DTC pin floor; actual resistor on ZONRI board unmeasured (50-500 ns range)" }

# -----------------------------------------------------------------------------
# DRV8301 behavioral model (rung 3 / fault-injection tier)
# -----------------------------------------------------------------------------
[drv8301]
en_gate_ready_time = { value = 10.0e-3, unit = "s", status = "datasheet", source = "SLOS719F 6.9", note = "worst case of 5-10 ms; PWM/SPI invalid earlier" }
quick_reset_pulse_max = { value = 10.0e-6, unit = "s", status = "datasheet", source = "SLOS719F 6.9", note = "EN_GATE low pulse shorter than this = fault reset without shutdown" }
spi_sclk_max = { value = 10.0e6, unit = "Hz", status = "datasheet", source = "SLOS719F 6.8" }
amp_gain = { value = 10.0, unit = "V/V", status = "decided", note = "power-on default; SPI-settable 10/20/40/80" }
amp_vref = { value = 1.65, unit = "V", status = "ti-evm-baseline", blocked_by = "Q7", derived_from = "circuit.iout_channel", source = "ZONRI silkscreen REF+ 1.65V", note = "shunt-amp output midpoint = ref_pin_v/2" }
oc_adj_set = { value = 0, unit = "1", status = "assumed", blocked_by = "Q10", note = "power-on default unconfirmed; code 0 = 60 mV VDS = ~13 A trip with 4.6 mOhm FETs" }

# -----------------------------------------------------------------------------
# Codified circuit specifications - component-level values, the things a
# Q7 bench session measures with a DMM. Derived parameters below reference
# these via derived_from; derive_params.py recomputes and verifies them.
# All TI-EVM baseline today (clone unverified).
# -----------------------------------------------------------------------------
[circuit.emf_channel]
r_top = { value = 95.3e3, unit = "Ohm", status = "ti-evm-baseline", blocked_by = "Q7", source = "tidr738/tidr740a (95.3k 1%)" }
r_bottom = { value = 10.0e3, unit = "Ohm", status = "ti-evm-baseline", blocked_by = "Q7", source = "tidr738/tidr740a (10k 1%)" }
r_series = { value = 1.0e3, unit = "Ohm", status = "ti-evm-baseline", blocked_by = "Q7", note = "series R into the filter cap / ADC" }
c_filter = { value = 100.0e-9, unit = "F", status = "ti-evm-baseline", blocked_by = "Q7" }
# The two candidate topologies differ ~10x in cutoff: 'post_divider' (filter
# sees divider Thevenin + r_series ~ 10 kOhm) vs 'series_only' (ideal source
# behind r_series ~ 1 kOhm). Resolve by measurement on the ZONRI board.
filter_topology = { value = "post_divider", unit = "enum", status = "assumed", blocked_by = "Q7" }

[circuit.iout_channel]
shunt = { value = 2.0e-3, unit = "Ohm", status = "ti-evm-baseline", blocked_by = "Q7", source = "tidr740a BOM R80-R82, Rev B1" }
ref_pin_v = { value = 3.3, unit = "V", status = "ti-evm-baseline", blocked_by = "Q7", note = "DRV8301 REF pin; amp output midpoint = REF/2 (ZONRI silkscreen REF+ 1.65V)" }

[circuit.bus_divider]
r_top = { value = 53.6e3, unit = "Ohm", status = "ti-evm-baseline", blocked_by = "Q11", note = "extraction suspect - math does not close at 60 V" }
r_bottom = { value = 10.0e3, unit = "Ohm", status = "ti-evm-baseline", blocked_by = "Q11" }

[circuit.adc_frontend]
sample_switch_r = { value = 1.0e3, unit = "Ohm", status = "datasheet", source = "microchip-mcp3208-datasheet.pdf fig 4-1" }
sample_cap = { value = 20.0e-12, unit = "F", status = "datasheet", source = "microchip-mcp3208-datasheet.pdf fig 4-1" }
iout_source_impedance = { value = 10.0, unit = "Ohm", status = "ti-evm-baseline", blocked_by = "Q7", note = "OPA365-buffered IOUT outputs: near-zero closed-loop impedance" }

[circuit.harness]
r_return = { value = 0.02, unit = "Ohm", status = "assumed", blocked_by = "Q9", note = "inter-board ground-return resistance (jumper wires + connectors)" }
l_return = { value = 0.5e-6, unit = "H", status = "assumed", blocked_by = "Q9", note = "ground-return loop inductance, ~0.5 m of wire" }

[circuit.gate_pulldowns]
en_gate_pulldown = { value = 10.0e3, unit = "Ohm", status = "assumed", blocked_by = "Q13", note = "planned external pull-down holding EN_GATE low through the FPGA configuration window" }

# Open ADS9224R simultaneous current-sense module (hw/ads9224r-module/). A small
# open-hardware breakout designed off TI's ADS9224REVM topology (no open ADS9224R
# board exists to clone): low-side shunt -> THS4551 fully-differential driver ->
# RC charge-bucket -> ADS9224R AIN+/-, with a buffered reference. Values are
# EVM-topology baseline / datasheet-typical; promote to 'measured' after the
# bench bring-up (Q23). Feeds the derived scaling + the SPICE settling check.
[circuit.ads9224r_module]
shunt = { value = 2.0e-3, unit = "Ohm", status = "assumed", blocked_by = "Q23", note = "default low-side current shunt; other scaling options in hw/ads9224r-module/bom.csv" }
fda_rf = { value = 2.0e3, unit = "Ohm", status = "assumed", blocked_by = "Q23", note = "THS4551 feedback R; differential gain = fda_rf/fda_rg" }
fda_rg = { value = 100.0, unit = "Ohm", status = "assumed", blocked_by = "Q23", note = "THS4551 gain-set R" }
flt_r = { value = 10.0, unit = "Ohm", status = "assumed", blocked_by = "Q23", note = "ADC charge-bucket series R (FDA<->AINx isolation); TI SAR front-end app-note range 10-22 Ohm" }
flt_c = { value = 1.5e-9, unit = "F", status = "assumed", blocked_by = "Q23", note = "ADC charge-bucket cap; sources the cap-DAC charge each conversion" }
cdac = { value = 60.0e-12, unit = "F", status = "assumed", blocked_by = "Q23", note = "ADS9224R sampling cap-DAC (datasheet-typical for the SAR class); SPICE-model only" }
ref_v = { value = 4.096, unit = "V", status = "assumed", blocked_by = "Q23", note = "ADC reference; the EVM uses an external low-noise ref + buffer - confirm value/IC" }
ref_reservoir_c = { value = 10.0e-6, unit = "F", status = "assumed", blocked_by = "Q23", note = "reference reservoir cap; the SAR draws charge from REF each conversion; SPICE/board only" }

# -----------------------------------------------------------------------------
# Analog feedback chain - DERIVED from [circuit.*] (verify via
# `python3 sim/scripts/derive_params.py --check`)
# Consumed by: rung 2 onward.
# -----------------------------------------------------------------------------
[feedback.current]
shunt = { value = 2.0e-3, unit = "Ohm", status = "ti-evm-baseline", blocked_by = "Q7", derived_from = "circuit.iout_channel" }
offset = { value = 1.65, unit = "V", status = "ti-evm-baseline", blocked_by = "Q7", derived_from = "circuit.iout_channel", note = "= ref_pin_v/2 per DRV8301 amp transfer" }

# Open ADS9224R module current scaling - DERIVED from circuit.ads9224r_module.
[feedback.current_ads9224r]
fda_gain = { value = 20.0, unit = "V/V", status = "assumed", blocked_by = "Q23", derived_from = "circuit.ads9224r_module", note = "= fda_rf/fda_rg (THS4551 differential gain)" }
full_scale_a = { value = 102.4, unit = "A", status = "assumed", blocked_by = "Q23", derived_from = "circuit.ads9224r_module", note = "differential +/- full-scale = ref_v/(shunt*fda_gain)" }
codes_per_amp = { value = 320.0, unit = "1/A", status = "assumed", blocked_by = "Q23", derived_from = "circuit.ads9224r_module", note = "= 32768/full_scale_a (16-bit signed two's-complement)" }

[feedback.emf]
divider_ratio = { value = 0.0949667616334283, unit = "1", status = "ti-evm-baseline", blocked_by = "Q7", derived_from = "circuit.emf_channel", note = "= r_bottom/(r_top+r_bottom)" }
source_impedance = { value = 10050.328584994302, unit = "Ohm", status = "ti-evm-baseline", blocked_by = "Q7", derived_from = "circuit.emf_channel", note = "Thevenin (r_top||r_bottom) + r_series; drives ADC settling" }
rc_cutoff = { value = 158.35789008387587, unit = "Hz", status = "ti-evm-baseline", blocked_by = "Q7", derived_from = "circuit.emf_channel", note = "topology 'post_divider': pole at 1/(2*pi*source_impedance*c_filter). Was hand-estimated at 1.6 kHz before the topology was made explicit (10x error class)" }

[feedback.bus_voltage]
divider_ratio = { value = 0.15723270440251572, unit = "1", status = "ti-evm-baseline", blocked_by = "Q11", derived_from = "circuit.bus_divider", note = "= r_bottom/(r_top+r_bottom)" }

# -----------------------------------------------------------------------------
# ADC (MCP3208) - domain decision recorded in architecture.md
# Consumed by: rung 2 onward.
# -----------------------------------------------------------------------------
[adc]
vref = { value = 3.3, unit = "V", status = "decided", source = "architecture.md ADC decision" }
sclk = { value = 1.0e6, unit = "Hz", status = "datasheet", source = "microchip-mcp3208-datasheet.pdf", note = "2.7 V spec used conservatively at 3.3 V; bench-validate 1.3-1.5 MHz for margin" }
conversions_per_pwm_period = { value = 2, unit = "1", status = "decided", source = "architecture.md ADC decision", note = "sector-aware schedule: active current + floating EMF" }
sample_aperture = { value = 2.0e-6, unit = "s", status = "datasheet", source = "microchip-mcp3208-datasheet.pdf", note = "~1.5 SCLK cycles early in frame; must land in PWM off-window" }
ads9224r_acq_window_s = { value = 200.0e-9, unit = "s", status = "assumed", blocked_by = "Q23", note = "ADS9224R acquisition window at the module conversion rate (the charge-bucket settling budget)" }
acq_settle_residual_ads9224r = { value = 1.6195967923126097e-06, unit = "1", status = "assumed", blocked_by = "Q23", derived_from = "circuit.ads9224r_module", note = "single-pole bucket-settling estimate exp(-t_acq/(flt_r*flt_c)); target < 0.5 LSB (1.5e-5); SPICE cross-checks the RC, bench validates ENOB (Q23)" }
# Shared-sample-cap residual: fraction of (previous cap voltage - target)
# left at the hold instant, exp(-t_window/((R_source+R_switch)*C_sample)).
# Worst case = full-scale channel step: residual * 4096 LSB of crosstalk.
sample_residual_emf = { value = 0.0001999600079984003, unit = "1", status = "ti-evm-baseline", blocked_by = "Q7", derived_from = "circuit.adc_frontend", note = "EMF channels (3-5): charge share with the 100n filter cap at the pin; reservoir droop recovers via the channel RC (sample-theft feedback in the bench)" }
sample_residual_bus = { value = 0.00035079675924591436, unit = "1", status = "ti-evm-baseline", blocked_by = "Q11", derived_from = "circuit.adc_frontend", note = "VBUS channel (6), ~8.4 kOhm source, no local cap: settling residual" }
sample_residual_iout = { value = 0.0, unit = "1", status = "ti-evm-baseline", blocked_by = "Q7", derived_from = "circuit.adc_frontend", note = "IOUT channels (0-2), op-amp buffered: negligible" }
# Transfer nonidealities (realism stage 3; datasheet-grade, applied always).
offset_lsb = { value = 1.0, unit = "1", status = "datasheet", source = "microchip-mcp3208-datasheet.pdf (offset error +/-1 LSB max)" }
gain_error = { value = 2.4e-4, unit = "1", status = "datasheet", source = "microchip-mcp3208-datasheet.pdf (gain error +/-1 LSB max over 4096)" }
inl_bow_lsb = { value = 1.0, unit = "1", status = "datasheet", source = "microchip-mcp3208-datasheet.pdf (INL +/-1 LSB max, modeled as smooth bow)" }

