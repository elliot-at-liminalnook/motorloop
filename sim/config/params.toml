# -----------------------------------------------------------------------------
# RTL build-time constants. sim/scripts/gen_rtl_params.py renders these (plus
# pwm.*, motor.pole_pairs, adc.*, drv8301.*) into rtl/gen/rtl_params.vh so the
# Verilog and the simulation share one source of truth.
# -----------------------------------------------------------------------------
[rtl]
clock_frequency = { value = 25.0e6, unit = "Hz", status = "assumed", blocked_by = "Q12", note = "core oscillator read as 25 MHz off the schematic, unconfirmed; bench clocks the RTL at this rate" }
drv_spi_divider = { value = 16, unit = "1", status = "decided", note = "SCLK = clk/div ~ 1.56 MHz, well under the DRV8301 10 MHz max" }
adc_spi_divider = { value = 26, unit = "1", status = "decided", note = "SCLK = clk/div ~ 961 kHz, margin under the 1 MHz budget" }
adc_emf_lead_cycles = { value = 160, unit = "1", status = "decided", note = "EMF conversion launch lead so the hold aperture lands at the PWM off-window center (~5.5 SCLK after CS fall)" }
drv_refresh_period = { value = 1.0e-3, unit = "s", status = "decided", note = "register readback-verify-rewrite watchdog period (slva552)" }
speed_pi_kp = { value = 12, unit = "1", status = "assumed", blocked_by = "Q1", note = "duty counts per rad/s error; tuned against placeholder motor params, retune after motor ID" }
speed_pi_ki_shift = { value = 4, unit = "1", status = "assumed", blocked_by = "Q1", note = "integral gain = kp >> shift per update; tuned against placeholder motor params" }
sensored_align_offset = { value = 3755, unit = "1", status = "decided", note = "elec12 counts; drive sector = floor((theta_e + 330 deg)/60 deg) for the sim plant's phase convention. Hardware needs an alignment routine (sensor mounting unknown, Q1)" }
oc_adj_code = { value = 16, unit = "1", status = "assumed", blocked_by = "Q5", note = "VDS trip 0.403 V -> ~88 A with 4.6 mOhm FETs at the TI table; revisit with real operating point" }
amp_gain_code = { value = 0, unit = "1", status = "decided", note = "10 V/V power-on default keeps SPI config minimal for first spin" }
uart_baud = { value = 115200, unit = "Hz", status = "assumed", note = "telemetry/command link rate; final choice with the host tooling" }
duty_down_slew = { value = 40, unit = "1", status = "assumed", blocked_by = "Q5", note = "max duty-compare decrease per PI update: bounds regen current (~0.8 A steps) so deceleration cannot pump the bus (realism 1.7) without crippling decel dynamics; retune with motor" }
# Edge-case policy constants (edge-case-scenarios.md spec gaps; decisions
# recorded in architecture.md).
sector_hysteresis = { value = 64, unit = "1", status = "decided", note = "E1: elec12 counts of hysteresis on the sensored-sector compare (~5.6 elec deg) so boundary noise cannot chatter the commutation" }
emf_skip_duty_margin = { value = 24, unit = "1", status = "decided", note = "E4: skip the EMF conversion when duty_compare > HALF - margin (off-window narrower than the hold aperture); EMF code holds last valid value" }
dc_cal_offset_tol = { value = 256, unit = "1", status = "decided", note = "E10: captured DC_CAL offsets accepted only within 2048 +/- tol; else previous value kept and a flag raised" }
drv_dead_threshold = { value = 8, unit = "1", status = "decided", note = "E13: consecutive verify-rewrite failures before declaring the DRV dead (latched safe-off + flag)" }
fault_lockout_threshold = { value = 4, unit = "1", status = "decided", note = "E20: consecutive fault recoveries without a healthy-run interval before latching lockout (cleared by >100 ms in mode 0)" }
stall_timeout = { value = 0.3, unit = "s", status = "assumed", blocked_by = "Q1", note = "E21: mode-2 stall detector - duty near max with zero speed for this long = stall fault (safe-off; cleared in mode 0); retune with motor" }
uart_byte_timeout = { value = 2.0e-3, unit = "s", status = "decided", note = "E16: inter-byte timeout resetting the UART command FSM so one torn frame cannot poison the link" }
adc_stuck_threshold = { value = 32, unit = "1", status = "decided", note = "E14: consecutive all-zero or all-one conversions before flagging the ADC as stuck/absent (telemetry flag)" }

# -----------------------------------------------------------------------------
# Field-oriented control (FOC). Sinusoidal PMSM control law; see
# notes/foc-checklist.md and notes/foc-fixed-point.md. The plant is unchanged
# (phase-variable abc) - FOC is enabled by motor.emf_trapezoid_blend = 0
# (sinusoidal) plus the FOC RTL, selected by ctrl_mode = 3.
# -----------------------------------------------------------------------------
[foc]
id_target = { value = 0, unit = "LSB", status = "decided", note = "d-axis current command; 0 for a surface PMSM (no reluctance torque to exploit). Field weakening drives it negative above base speed." }
align_offset = { value = 160, unit = "1", status = "decided", note = "elec12 counts aligning the sensor angle with the FOC dq frame (q-axis on the EMF). Determined by a bench torque-maximizing sweep at 100% efficiency (foc-checklist stage 5); DIFFERENT from rtl.sensored_align_offset (the six-step sector convention). Hardware needs an alignment routine - sensor mounting unknown (Q1/Q20)." }
cur_pi_kp = { value = 2, unit = "1", status = "assumed", blocked_by = "Q1", note = "current-loop proportional gain (duty-units per current-LSB error); tuned against placeholder motor params, retune after motor ID" }
cur_pi_ki_shift = { value = 4, unit = "1", status = "assumed", blocked_by = "Q1", note = "current-loop integral gain = kp >> shift per FOC update; tuned against placeholder motor params" }
speed_kp = { value = 4, unit = "1", status = "assumed", blocked_by = "Q1", note = "FOC outer speed loop: iq* current command (LSB) per rad/s speed error; tuned against placeholder motor params" }
speed_ki_shift = { value = 5, unit = "1", status = "assumed", blocked_by = "Q1", note = "FOC speed-loop integral gain = speed_kp >> shift per update" }
iq_max = { value = 300, unit = "LSB", status = "assumed", blocked_by = "Q1", note = "FOC speed-loop torque-current clamp (~12 A at the placeholder shunt/gain); the current loop's circle limiter bounds the voltage regardless" }
v_circle_limit = { value = 0.95, unit = "1", status = "decided", note = "fraction of the inscribed-circle modulation radius the voltage-circle limiter allows (leaves headroom for dead time and min-pulse)" }
sincos_table_bits = { value = 8, unit = "1", status = "decided", note = "quarter-wave sin/cos LUT address bits (2^8 = 256 entries/quadrant); 16-bit electrical angle, Q15 signed output" }
angle_extrap_enable = { value = 1, unit = "1", status = "assumed", blocked_by = "Q22", note = "enable angle-latency compensation (theta += omega_e * angle_latency); the sensor frame+filter lag rotates the dq frame off-true and the error grows with speed (Q18)" }
angle_latency_s = { value = 1.5e-3, unit = "s", status = "assumed", blocked_by = "Q22", note = "effective AS5600 angle latency to compensate; ~1.1 ms PWM frame + filter group delay (angle_sensor.*). Bench-measured per Q22." }
current_sample_scheme = { value = 0, unit = "enum", status = "assumed", blocked_by = "Q21", note = "phase-current acquisition: 0 dual-ADC simultaneous, 1 sequential single-ADC with inter-sample skew, 2 single-shunt DC-bus reconstruction. The single MCP3208 cannot do 0 (Q17/architecture.md); the bench evaluates the ripple of each before a board decision." }

# -----------------------------------------------------------------------------
# Simulation engine constants
# -----------------------------------------------------------------------------
[sim]
current_epsilon = { value = 1.0e-6, unit = "A", status = "decided", note = "float-mode threshold for diode/disconnect resolution" }
max_substep = { value = 1.0e-6, unit = "s", status = "decided", note = "plant integration substep cap in the lockstep bench (switched mode)" }

# -----------------------------------------------------------------------------
# Scenario defaults for the rung-1 one-phase reference run
# -----------------------------------------------------------------------------
[scenario.one_phase_reference]
stop = { value = 0.100, unit = "s", status = "decided", note = "plumbing test horizon" }
dt = { value = 1.0e-5, unit = "s", status = "decided", note = "RK4 fixed step" }
load_torque = { value = 0.0, unit = "N.m", status = "decided", note = "free shaft" }
# Piecewise-constant duty schedule, [[t_start_s, duty], ...]; shared verbatim by
# the Python, C++, and Modelica implementations so parity is exact.
duty_schedule = { value = [[0.0, 0.0], [0.005, 0.25], [0.050, 0.50], [0.075, 0.0]], unit = "(s, 1)", status = "decided" }

# -----------------------------------------------------------------------------
# Open-loop forced six-step ramp (averaged mode): the three-way parity scenario
# shared by the C++ plant, the Python reference, and the Modelica oracle.
# -----------------------------------------------------------------------------
[scenario.three_phase_open_loop]
stop = { value = 0.150, unit = "s", status = "decided" }
dt = { value = 1.0e-5, unit = "s", status = "decided", note = "outer step; sector held constant within it" }
max_substep = { value = 1.0e-5, unit = "s", status = "decided", note = "averaged-mode parity runs integrate at the outer step" }
duty = { value = 0.5, unit = "1", status = "decided" }
f_elec_final = { value = 40.0, unit = "Hz", status = "decided", note = "electrical commutation frequency after the ramp" }
ramp_time = { value = 0.100, unit = "s", status = "decided" }
load_torque = { value = 0.0, unit = "N.m", status = "decided" }
