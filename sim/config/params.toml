gnd_shift_l = { value = 0.5e-6, unit = "H", status = "assumed", blocked_by = "Q9", derived_from = "circuit.harness", note = "= harness l_return; common-mode V per A/s of bus return slew" }
gate_edge_spike = { value = 20.0e-3, unit = "V", status = "assumed", blocked_by = "Q9", note = "switching-edge transient amplitude on current/EMF channels" }
gate_edge_tau = { value = 1.0e-6, unit = "s", status = "assumed", blocked_by = "Q9", note = "edge transient decay time constant" }
vref_ripple = { value = 10.0e-3, unit = "V", status = "assumed", blocked_by = "Q9", note = "PWM-synchronized ripple on the 3.3 V rail feeding the ADC reference" }

