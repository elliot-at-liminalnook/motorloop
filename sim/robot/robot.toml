# SPDX-License-Identifier: MIT
# Parametric quadruped — single provenance-tracked source for the 6 lb body model.
# `gen_robot_mjcf.py` turns this into an MJCF (MJX-native). Go2-scale defaults so
# you inherit a physically-valid legs-under-body start; every value is trust-tagged
# (measured/datasheet/decided/assumed) in the same spirit as derive_params.py.
# Modify a part = edit a value here -> regenerate -> retrain (warm-start if the
# action dim is unchanged; from-scratch only if a leg/DOF is added).

[meta]
name = "paramquad"

[torso]
half_extents = [0.19, 0.05, 0.05]   # m, decided (~Go2 trunk)
mass = 0.5479633165                 # kg, mass-budgeted: torso/chassis share. Together with four
                                    # scaled legs, 12x 68 g ST3215-HS servos, and two enabled
                                    # steel striker rods, compiled fighter mass = 6.000 lb.
spawn_height = 0.38                 # m, clears the 0.24 m legs in the canonical stance

[leg_defaults]                      # mammalian 3-DOF leg (abduction, hip-flex, knee)
thigh_len = 0.24                    # m, retained geometry; revalidated at the 6 lb limit
calf_len = 0.24                     # m, paired with thigh_len for symmetric crouch/tall stance
link_radius = 0.020                 # m, decided
hip_offset = 0.06                   # m, reduced 0.08->0.06 (less splay so legs sit under the body for fore/aft stride)
hip_mass = 0.065755598              # kg, allocated structure (servo mass is added by generator)
thigh_mass = 0.131511196            # kg, allocated structure
calf_mass = 0.043837065             # kg, allocated structure
foot_radius = 0.030                 # m, 0.040->0.030 (Go2-ish)
foot_mass = 0.010959266             # kg, allocated structure
stand_abd = 0.0                     # rad, spring/reset reference
stand_flex = 0.15                   # rad, taller gait-search stance
stand_knee = -1.25                  # rad, taller gait-search stance
abd_range = [-0.80, 0.80]           # rad, assumed
flex_range = [-1.50, 1.50]          # rad, assumed
knee_range = [-2.60, -0.40]         # rad, assumed (knee bends one way)
joint_damping = 0.05                # N·m·s/rad, low passive joint damping
joint_stiffness = 0.5                # N·m/rad — mild passive support, not stance scaffolding.
                                    # The ST3215-HS + 3:1 abstract drive validates at ±5.88 N·m
                                    # with 0.51 steady holding/deliverable torque margin.

[actuator]
motor = "waveshare_st3215_hs"       # all 12 joints; sim/tests/motors.py datasheet profile
voltage = 12.0                      # V operating point for 20 kg.cm / 106 RPM ratings
peak_factor = 1.0                   # integrated servo; no external current-multiple assumption
gear = 3.0                          # uniform 3:1 abstraction; the CAD model carries the
                                    # real per-axis 6:1 yaw / 20:1 worm / direct knee ratios

[contact]
friction = [2.8, 0.28, 0.28]        # highest clean traction found before peak-penetration gate trips

[striker]                           # pneumatic fast-extend STEEL ROD weapon (off by default → body
                                    # byte-identical). Enabled per-build (AdversarialEnv striker=True);
                                    # added to FRONT legs (pos.x>0) as a powered slide DOF + rod.
enabled    = true                   # decided (striker ON by default — core to the fighter body)
stroke     = 0.10                   # m, rod travel, decided
rod_len    = 0.10                   # m, rod length, decided
rod_radius = 0.008                  # m, decided
rod_density= 7850                   # kg/m³, STEEL -> ~0.175 kg per rod including caps
bore       = 0.016                  # m, pneumatic piston bore, decided
pressure   = 800000.0               # Pa (8 bar shop-air/CO2), decided -> F = P·π(bore/2)² ≈ 161 N
valve_tau  = 0.005                  # s, solenoid/fill first-order lag (the real speed bottleneck)
return_stiffness = 40.0             # N/m, weak return spring (retract when not fired), decided
fire_cost  = 0.05                   # reward penalty per unit fire ctrl (air/energy) — fire to connect

# Legs: any number, any attachment. Default = 4 corners (a Go2-style quad). Add a
# 5th entry is a topology research case only; it is not the selected 12-servo BOM.
[[leg]]
name = "FL"
pos = [0.19, 0.11, 0.0]
[[leg]]
name = "FR"
pos = [0.19, -0.11, 0.0]
[[leg]]
name = "RL"
pos = [-0.19, 0.11, 0.0]
[[leg]]
name = "RR"
pos = [-0.19, -0.11, 0.0]

[domain_randomization]              # ranges trained over so part-swaps need no retrain
torso_mass = [0.50, 0.5479633165]    # never randomize above the 6 lb nominal fighter
thigh_len = [0.21, 0.27]
calf_len = [0.21, 0.27]
gear = [3.0, 3.0]                   # fixed abstract reduction
joint_stiffness = [0.0, 1.0]         # brackets the 0.5 center (was [0,2] around the spring-crutch 2.0)
