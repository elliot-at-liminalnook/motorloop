# SPDX-License-Identifier: MIT
schema_version = 1
last_reviewed = "2026-07-12"

# Rules are applied in order; later matches refine earlier ones. Exact overrides
# below win over every rule. The generated catalog makes the resolved metadata
# visible without adding a large header to every historical source file.

[[rules]]
glob = "*.md"
status = "reference"
kind = "reference"
audience = "contributors"

[[rules]]
glob = "notes/*.md"
status = "historical"
kind = "project record"
audience = "maintainers"

[[rules]]
glob = "notes/*-checklist.md"
status = "historical"
kind = "execution record"
audience = "maintainers"

[[rules]]
glob = "notes/*-report.md"
status = "historical"
kind = "dated result"
audience = "researchers and maintainers"

[[rules]]
glob = "notes/archive/*.md"
status = "reference"
kind = "archive index"
audience = "maintainers"

[[rules]]
glob = "rtl/contracts/*.md"
status = "reference"
kind = "RTL contract"
audience = "FPGA and ASIC developers"

[[rules]]
glob = "figures/**/gallery.md"
status = "generated"
kind = "media index"
audience = "all readers"

[[rules]]
glob = "formal/proof_report.md"
status = "generated"
kind = "formal evidence"
audience = "verification engineers"

[[rules]]
glob = "synth/*report.md"
status = "generated"
kind = "implementation evidence"
audience = "FPGA and ASIC developers"

[[rules]]
glob = "notes/status-matrix-generated.md"
status = "generated"
kind = "status evidence"
audience = "all readers"

[[overrides]]
path = "README.md"
status = "current"
kind = "project overview"
audience = "newcomers"
canonical_for = "repository overview and top-level navigation"
header_required = true

