[[check]]
id            = "pwm_deadtime"
module        = "pwm_generator"
checker       = "formal/bind/pwm_deadtime_fv.sv"
rtl           = ["rtl/pwm_generator.v"]
category      = "safety"
method        = "prove"
engine        = "smtbmc boolector"
depth         = 8
expected      = "PROVEN"
covers        = true
param_scope   = "config"
assumptions   = ["synchronous reset (sby init)"]
properties    = ["Dead-time minimum: a gate asserts only after its complement has been off >= DEAD_CYCLES (no cross-conduction window)"]
cover_props   = ["a complementary gate handoff actually occurs"]
justification = "1-inductive via the design's real off-time counters (a gate rises only when the relevant off-time counter was already >= DEAD)."

[[check]]
id            = "drv_manager"
module        = "drv_manager"
checker       = "formal/bind/drv_manager_fv.sv"
rtl           = ["rtl/drv_manager.v"]
category      = "safety"
method        = "prove"
engine        = "smtbmc boolector"
depth         = 8
expected      = "PROVEN"
covers        = false
param_scope   = "config"
assumptions   = ["synchronous reset (sby init)"]
properties    = ["FSM legality: the state register only ever holds one of the 17 defined states (no undefined/illegal state)"]
justification = "k-inductive; every case arm assigns a defined next state and reset starts at S_PWRUP. Reachability covers omitted (deep power-up timer makes BMC infeasible; sim tier exercises the full FSM)."

[[check]]
id            = "pwm_reset"
module        = "pwm_generator"
checker       = "formal/bind/pwm_reset_fv.sv"
rtl           = ["rtl/pwm_generator.v"]
category      = "reset"
method        = "prove"
engine        = "smtbmc boolector"
depth         = 8
expected      = "PROVEN"
covers        = true
param_scope   = "config"
assumptions   = ["rst_n is the async active-low reset"]
properties    = [
  "During reset, every gate is off",
  "Immediately after reset deasserts, every gate is still off (no power-on glitch)",
]
cover_props   = ["reset actually occurs", "reset actually releases"]
justification = "Async reset holds the gate FFs at 0; the post-release cycle is safe because the FFs were reset."

[[check]]
id            = "controller_top_composition"
module        = "controller_top"
checker       = "formal/bind/controller_top_fv.sv"
rtl           = ["rtl/controller_top.v", "rtl/pwm_generator.v", "rtl/commutation.v", "rtl/spi_drv_master.v", "rtl/adc_spi_master.v", "rtl/divider32.v", "rtl/as5600_pwm_capture.v", "rtl/speed_meter.v", "rtl/speed_pi.v", "rtl/open_loop_ramp.v", "rtl/drv_manager.v", "rtl/adc_sequencer.v", "rtl/sincos.v", "rtl/clarke.v", "rtl/park.v", "rtl/inv_park.v", "rtl/svpwm.v", "rtl/current_pi.v", "rtl/circle_limit.v", "rtl/foc_core.v", "rtl/speed_iq_pi.v", "rtl/uart_regfile.v", "rtl/uart_rx.v", "rtl/uart_tx.v"]
includes      = ["rtl/gen/sincos_init.vh"]
category      = "safety"
method        = "prove"
engine        = "smtbmc boolector"
depth         = 12
expected      = "PROVEN"
covers        = true
param_scope   = "config"
assumptions   = ["synchronous reset (sby init)"]
properties    = ["Top-level composition: the integrated controller never commands shoot-through at inh/inl, across every mode and the FOC/six-step muxing"]
cover_props   = ["the gates actually drive at the top level"]
justification = "The pwm_generator shoot-through guarantee holds for any leg_mode/duty3, so the mode mux cannot break it; proven at the top boundary to confirm nothing downstream inverts/bypasses it."

