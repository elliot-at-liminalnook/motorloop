# SPDX-License-Identifier: MIT
# Formal property manifest - the single source of truth for what we prove and
# under what assumptions (formal-checklist.md). Each [[check]] is one sby task
# (one checker bound into one module). run_formal.py drives proofs from this;
# gen_proof_report.py renders proof_report.md from this + work/results.json.
#
# Fields:
#   id            unique task name
#   module        the DUT top for the proof
#   checker       the bound *_fv.sv checker
#   rtl           RTL source files the DUT needs
#   includes      extra `include files (e.g. generated headers) - optional
#   category      safety | bounded | reset | cover | liveness | equivalence
#   method        prove (unbounded k-induction) | bmc (bounded) | cover
#   engine        sby engine line
#   depth         BMC/induction depth
#   expected      PROVEN | BOUNDED | COVER  (run_formal --check enforces this)
#   covers        true if the checker carries non-vacuity covers to run
#   param_scope   config (motorloop constants) | envelope (param range)
#   envelope      the legal parameter range, when param_scope = envelope
#   assumptions   the assumptions the proof relies on (rendered in the report)
#   properties    English claims proven (for the report)
#   cover_props   English non-vacuity covers (for the report)
#   justification one line of rationale

[[check]]
id            = "pwm_generator"
module        = "pwm_generator"
checker       = "formal/bind/pwm_generator_fv.sv"
rtl           = ["rtl/pwm_generator.v"]
category      = "safety"
method        = "prove"
engine        = "smtbmc boolector"
depth         = 20
expected      = "PROVEN"
covers        = true
param_scope   = "config"
assumptions   = [
  "synchronous reset is applied (sby init), then rst_n high",
  "the PWM constants are the motorloop config (PWM_HALF_PERIOD=625, DEAD_CYCLES=25, MIN_PULSE_CYCLES from rtl_params.vh)",
]
properties    = [
  "Shoot-through freedom: no leg ever drives both gates simultaneously",
  "PWM counter stays within [0, PWM_HALF_PERIOD]",
  "While kill holds, every gate is off",
]
cover_props   = [
  "high-side actually enables",
  "low-side actually enables",
  "active high-side drive (high-side on while counting up) is reachable",
  "kill occurs during operation",
]
justification = "Plant-independent safety; gate exclusivity is combinational (1-inductive), counter bound k-inductive with the peak-implies-down strengthening."

[[check]]
id            = "svpwm"
module        = "svpwm"
top           = "svpwm_fv"
checker       = "formal/bind/svpwm_fv.sv"
rtl           = ["rtl/svpwm.v"]
category      = "safety"
method        = "prove"
engine        = "smtbmc boolector"
depth         = 6
expected      = "PROVEN"
covers        = true
param_scope   = "config"
assumptions   = [
  "|valpha|, |vbeta| <= V_RAW_MAX = 2500 (the design feeds svpwm from inv_park of the circle-limited voltage; discharged by stage-9 composition)",
]
properties    = ["SVPWM: every per-leg duty stays within [0, PWM_HALF_PERIOD]"]
cover_props   = [
  "an actively-modulating (non-centered) duty is reachable",
  "a leg can reach 0% and 100% duty",
]
justification = "Combinational; min/max injection + sat_duty clamp every leg into [0, HALF] under the bounded-input assumption."

[[check]]
id            = "circle_limit"
module        = "circle_limit"
top           = "circle_limit_fv"
checker       = "formal/bind/circle_limit_fv.sv"
rtl           = ["rtl/circle_limit.v"]
category      = "safety"
method        = "prove"
engine        = "smtbmc boolector"
depth         = 6
expected      = "DOCUMENTED"
skip          = true
covers        = false
param_scope   = "config"
assumptions   = [
  "|vd_in|, |vq_in| <= V_RAW_MAX = 2500 (current_pi clamps its output; circle_limit's 32-bit mag2 would otherwise overflow)",
]
properties    = ["Voltage-circle limiter: |(vd_out, vq_out)| <= V_CIRCLE_LIMIT + slack (modulation stays within the inscribed circle)"]
justification = "DOCUMENTED, not machine-proven: the property requires reasoning through an integer divide and square root, intractable for the open bit-blasting SMT engines (boolector timed out > 5 min). Bounded by construction (|d| <= isqrt(d^2+q^2) so |d*VLIM/mag| <= VLIM up to integer-floor slack) and validated by the FOC simulation tier. An arithmetic-aware prover or a bit-width-reduced reformulation is future work."

[[check]]
id            = "current_pi"
module        = "current_pi"
checker       = "formal/bind/current_pi_fv.sv"
rtl           = ["rtl/current_pi.v"]
category      = "safety"
method        = "prove"
engine        = "smtbmc boolector"
depth         = 6
expected      = "PROVEN"
covers        = true
param_scope   = "envelope"
envelope      = "any V_RAW_MAX (the bound is the module's own parameter, passed through the bind)"
assumptions   = ["synchronous reset (sby init)"]
properties    = ["Current-PI output stays within its clamp [-V_RAW_MAX, V_RAW_MAX] for any error/integrator state AND any V_RAW_MAX parameter (parameter-generic)"]
cover_props   = ["the clamp is reachable (PI can demand max and min drive)"]
justification = "The output sat() clamps praw to the module's V_RAW_MAX regardless of the (possibly overflowed) integrator term; the checker asserts the SAME parameter (passed through the bind), so the bound is generic over V_RAW_MAX. Bounds the input the circle limiter assumes."

