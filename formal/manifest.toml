[[check]]
id            = "as5047p_spi_master"
module        = "as5047p_spi_master"
checker       = "formal/bind/as5047p_spi_master_fv.sv"
rtl           = ["rtl/as5047p_spi_master.v"]
category      = "safety"
method        = "prove"
engine        = "smtbmc boolector"
depth         = 20
expected      = "PROVEN"
covers        = true
param_scope   = "config"
assumptions   = ["synchronous reset (sby init)"]
properties    = [
  "FSM legality: the SPI master state register only ever holds one of the 6 defined states S_IDLE..S_GAP",
  "new_sample is a well-formed single-cycle pulse - one event per latched angle",
]
cover_props   = [
  "a read frame actually starts (ncs asserts low)",
  "the SPI clock actually toggles",
]
justification = "1-/k-inductive: every case arm assigns a defined next state (reset at S_IDLE), and new_sample defaults to 0 and is set for at most one cycle. The full 16-bit read that fires new_sample is ~280 cycles deep (sim-tier coverage); the shallow covers prove the FSM is live."

