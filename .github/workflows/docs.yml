# SPDX-License-Identifier: MIT
# Publish the docs site to GitHub Pages (release-and-portability-checklist §3.2),
# so the contracts catalog + status matrix + WaveDrom timing are browsable online.
# Enable Pages (Settings -> Pages -> source: GitHub Actions) once.
name: docs

on:
  push:
    branches: ["main"]
    paths: ["rtl/contracts/**", "notes/**", "scripts/gen_docs.py", "mkdocs.yml",
            ".github/workflows/docs.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements-docs.txt
      - name: Build the site
        run: |
          python3 scripts/gen_docs.py
          mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with: { path: site }
      - id: deploy
        uses: actions/deploy-pages@v4
