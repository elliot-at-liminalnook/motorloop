# SPDX-License-Identifier: MIT
site_name: motorloop
site_description: Motor-control verification, robot simulation, and evidence-backed learning
repo_url: https://github.com/elliot-at-liminalnook/motorloop
docs_dir: site-src

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - pymdownx.superfences:
      custom_fences:
        - name: wavedrom
          class: wavedrom
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/wavedrom/3.5.0/skins/default.js
  - https://cdnjs.cloudflare.com/ajax/libs/wavedrom/3.5.0/wavedrom.min.js
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - js/wavedrom-init.js
  - js/mermaid-init.js

# Repository-local links are checked before assembly by scripts/check_docs.py.
# During assembly, links to curated pages remain inside the site and links to
# non-curated repository records are rewritten to their GitHub source pages.

nav:
  - Home: index.md
  - Start here:
      - Getting started: notes/getting-started.md
      - Current status: notes/current-status.md
      - Reader paths: notes/reader-paths.md
      - Glossary: notes/glossary.md
  - System:
      - Whole-system architecture: notes/system-architecture.md
      - Component-bench decision: notes/architecture.md
      - Robot hardware contract: notes/robot-hardware-contract.md
      - Open questions: notes/open-questions.md
  - Workflows:
      - Reproduce the repository: notes/reproduce.md
      - Robot and RL launch gate: notes/pre-gpu-test-entrypoint.md
      - Component simulation: sim/README.md
      - Formal verification: formal/README.md
      - Hardware bring-up: notes/hardware-bringup-notes.md
  - Evidence:
      - Generated status matrix: notes/status-matrix-generated.md
      - Formal proof report: formal/proof_report.md
      - ECP5 synthesis report: synth/synth_report.md
      - Warp launch-gate evidence: notes/runpod-warp-validation-2026-07-10.md
      - Verification plan: notes/verification-plan.md
      - RL verification playbook: notes/rl-verification-playbook.md
  - Active work:
      - Locomotion and combat status: notes/locomotion-status.md
      - Historical uplift result: notes/training-uplift-results.md
  - Background:
      - Project ethos: notes/ethos.md
      - Component facts digest: notes/docs-digest.md
